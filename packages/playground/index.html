<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Primary Meta Tags -->
		<title>littlewing playground</title>
		<meta name="title" content="littlewing playground" />
		<meta
			name="description"
			content="Interactive playground for littlewing, a minimal multi-type expression language with numbers, strings, booleans, dates, times, arrays, and 86 built-in functions."
		/>
		<meta
			name="keywords"
			content="littlewing, expression language, playground, parser, interpreter, AST, formula engine, multi-type, date arithmetic, array functions"
		/>
		<meta name="author" content="@brielov" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://littlewing-playground.vercel.app/" />
		<meta property="og:title" content="littlewing playground" />
		<meta
			property="og:description"
			content="Interactive playground for littlewing, a minimal multi-type expression language with numbers, strings, booleans, dates, times, arrays, and 86 built-in functions."
		/>

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://littlewing-playground.vercel.app/" />
		<meta property="twitter:title" content="littlewing playground" />
		<meta
			property="twitter:description"
			content="Interactive playground for littlewing, a minimal multi-type expression language with numbers, strings, booleans, dates, times, arrays, and 86 built-in functions."
		/>

		<!-- Canonical URL -->
		<link rel="canonical" href="https://littlewing-playground.vercel.app/" />

		<!-- Favicon -->
		<link
			id="favicon"
			rel="icon"
			type="image/png"
			sizes="96x96"
			href="/favicon-light-96x96.png?v=20260424"
		/>
		<link
			id="shortcut-icon"
			rel="shortcut icon"
			type="image/png"
			href="/favicon-light-96x96.png?v=20260424"
		/>
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />

		<script>
			const darkModeQuery = window.matchMedia('(prefers-color-scheme: dark)');
			const faviconHref = (isDark) =>
				isDark ? '/favicon-dark-96x96.png?v=20260424' : '/favicon-light-96x96.png?v=20260424';

			const updateFavicon = (isDark) => {
				const href = faviconHref(isDark);
				const dynamicLinks = [
					document.getElementById('favicon'),
					document.getElementById('shortcut-icon'),
				];

				for (const link of dynamicLinks) {
					if (link instanceof HTMLLinkElement) {
						link.href = href;
					}
				}
			};

			const handleSchemeChange = (event) => updateFavicon(event.matches);

			updateFavicon(darkModeQuery.matches);
			if (typeof darkModeQuery.addEventListener === 'function') {
				darkModeQuery.addEventListener('change', handleSchemeChange);
			} else if (typeof darkModeQuery.addListener === 'function') {
				darkModeQuery.addListener(handleSchemeChange);
			}
		</script>

		<!-- Theme Color -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
